version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: entra-sqlserver
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: YourSecurePassword123!
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./backend/database/schema.sql:/var/opt/mssql/schema.sql
      - ./backend/database/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - entra-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourSecurePassword123! -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: entra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - entra-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entra-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_NAME: entra_compliance
      DB_USER: sa
      DB_PASSWORD: YourSecurePassword123!
      DB_ENCRYPT: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TLS: false
      JWT_SECRET: development-secret-key-at-least-64-characters-long-for-security
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/logs:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - entra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
        REACT_APP_AZURE_TENANT_ID: ${AZURE_TENANT_ID}
        REACT_APP_AZURE_REDIRECT_URI: http://localhost:3000/auth/callback
        REACT_APP_API_BASE_URL: http://localhost:5000/api
    container_name: entra-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - entra-network
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  sqlserver_data:
  redis_data:

networks:
  entra-network:
    driver: bridge